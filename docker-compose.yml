# Local end-to-end validation environment.
#
#   docker compose run --rm validate     # full quality gate in a clean container
#   docker compose up -d sonarqube       # SonarQube at http://localhost:9000 (admin/admin)
#   # then, with sonar-scanner on PATH:  sonar-scanner -Dsonar.token=<token>
services:
  validate:
    build: .
    image: treasuryforge:ci
    command: ["bash", "scripts/ci.sh"]

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
