sonar.projectKey=treasuryforge
sonar.projectName=treasuryforge
sonar.projectVersion=0.1.0

sonar.sources=treasuryforge
sonar.tests=tests
sonar.python.version=3.11,3.12

# coverage produced by: pytest --cov=treasuryforge --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# network shims are exercised only against the live venues, not in unit tests
sonar.exclusions=**/transport.py,**/exchanges/**/secrets.py
sonar.sourceEncoding=UTF-8
